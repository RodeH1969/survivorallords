services:
  - type: web
    name: survivor-all-ords
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: RENDER
        value: "true"
    disk:
      name: survivor-data
      mountPath: /opt/render/project/data
      sizeGB: 1
